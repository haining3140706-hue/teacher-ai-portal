function RadarChart({ data, width, height }) {
  const cx = width / 2, cy = height / 2;
  const maxRadius = Math.min(cx, cy) * 0.8;
  const angleStep = (2 * Math.PI) / data.length;
  const startAngle = -Math.PI / 2;

  const getPoint = (i, value, max) => {
    const angle = startAngle + i * angleStep;
    const r = (value / max) * maxRadius;
    return {
      x: cx + r * Math.cos(angle),
      y: cy + r * Math.sin(angle)
    };
  };

  const points = data.map((d, i) => getPoint(i, d.score, 100));
  const polygonPoints = points.map(p => `${p.x},${p.y}`).join(' ');
  const gridLevels = [20, 40, 60, 80, 100];

  return (
    <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} style={{ overflow: 'visible' }}>
      {gridLevels.map(level => {
        const r = (level / 100) * maxRadius;
        return (
          <circle key={level} cx={cx} cy={cy} r={r} fill="none" stroke="#e2e8f0" strokeWidth="1" />
        );
      })}
      {data.map((d, i) => {
        const p = getPoint(i, 100, 100);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#e2e8f0" strokeWidth="1" />;
      })}
      <polygon points={polygonPoints} fill="#3b82f6" fillOpacity="0.4" stroke="#3b82f6" strokeWidth="2" />
      {points.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r="4" fill="#3b82f6" />
      ))}
      {data.map((d, i) => {
        const labelPoint = getPoint(i, 115, 100);
        return (
          <text key={i} x={labelPoint.x} y={labelPoint.y} textAnchor="middle" dominantBaseline="middle" fill="#475569" fontSize="11" fontFamily="sans-serif">
            {d.subject}
          </text>
        );
      })}
    </svg>
  );
}

function BarChartSVG({ data, width, height }) {
  const padding = { top: 20, right: 30, bottom: 40, left: 50 };
  const chartWidth = width - padding.left - padding.right;
  const chartHeight = height - padding.top - padding.bottom;
  const maxValue = Math.max(...data.flatMap(d => [d.活跃度, d.提交量]));
  const barGroupWidth = chartWidth / data.length;
  const barWidth = barGroupWidth * 0.35;
  const gap = barGroupWidth * 0.1;

  const scaleY = (value) => (value / maxValue) * chartHeight;

  return (
    <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} style={{ overflow: 'visible' }}>
      {[0, 0.25, 0.5, 0.75, 1].map((ratio, i) => (
        <line key={i} x1={padding.left} y1={padding.top + chartHeight * (1 - ratio)} x2={padding.left + chartWidth} y2={padding.top + chartHeight * (1 - ratio)} stroke="#e2e8f0" strokeWidth="1" />
      ))}
      <line x1={padding.left} y1={padding.top} x2={padding.left} y2={padding.top + chartHeight} stroke="#e2e8f0" strokeWidth="1" />
      <line x1={padding.left} y1={padding.top + chartHeight} x2={padding.left + chartWidth} y2={padding.top + chartHeight} stroke="#e2e8f0" strokeWidth="1" />
      {data.map((d, i) => {
        const x1 = padding.left + i * barGroupWidth + gap;
        const y1 = padding.top + chartHeight - scaleY(d.活跃度);
        const barHeight = scaleY(d.活跃度);
        const x3 = x1 + barWidth + gap;
        const y2 = padding.top + chartHeight - scaleY(d.提交量);
        const barHeight2 = scaleY(d.提交量);
        return (
          <g key={i}>
            <rect x={x1} y={y1} width={barWidth} height={barHeight} fill="#3b82f6" rx="4" />
            <rect x={x3} y={y2} width={barWidth} height={barHeight2} fill="#a855f7" rx="4" />
          </g>
        );
      })}
      {data.map((d, i) => (
        <text key={i} x={padding.left + i * barGroupWidth + barGroupWidth / 2} y={padding.top + chartHeight + 20} textAnchor="middle" fill="#64748b" fontSize="12" fontFamily="sans-serif">
          {d.name}
        </text>
      ))}
      {[0, 0.25, 0.5, 0.75, 1].map((ratio, i) => (
        <text key={i} x={padding.left - 8} y={padding.top + chartHeight * (1 - ratio) + 4} textAnchor="end" fill="#64748b" fontSize="11" fontFamily="sans-serif">
          {Math.round(maxValue * ratio)}
        </text>
      ))}
    </svg>
  );
}

        <span className="font-medium text-sm">{label}</span>
      </div>
      <span className="text-slate-300 group-hover:text-blue-500"><ChevronRight /></span>
    </button>
  );
}

// --- Render ---
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<TeacherPortal />);
  </script>
