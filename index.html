// --- SVG Charts ---
function RadarChart({ data, width, height }) {
  const cx = width / 2, cy = height / 2;
  const maxRadius = Math.min(cx, cy) * 0.8;
  const angleStep = (2 * Math.PI) / data.length;
  const startAngle = -Math.PI / 2;
  
  const getPoint = (i, value, max) => {
    const angle = startAngle + i * angleStep;
    const r = (value / max) * maxRadius;
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  };

  const points = data.map((d, i) => getPoint(i, d.score, 100));
  const polygonPoints = points.map(p => `${p.x},${p.y}`).join(' ');
  const gridLevels = [20, 40, 60, 80, 100];
  
  return (
    <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} style={{maxWidth: width, maxHeight: height}}>
      {gridLevels.map(level => {
        const r = (level / 100) * maxRadius;
        return <circle key={level} cx={cx} cy={cy} r={r} fill="none" stroke="#e2e8f0" strokeWidth="1" />;
      })}
      {data.map((d, i) => {
        const p = getPoint(i, 100, 100);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#e2e8f0" strokeWidth="1" />;
      })}
      <polygon points={polygonPoints} fill="#3b82f6" fillOpacity="0.4" stroke="#3b82f6" strokeWidth="2" />
      {points.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r="4" fill="#3b82f6" />
      ))}
      {data.map((d, i) => {
        const labelPoint = getPoint(i, 115, 100);
        return (
          <text key={i} x={labelPoint.x} y={labelPoint.y} textAnchor="middle" dominantBaseline="middle" fill="#475569" fontSize="11" fontFamily="sans-serif">
            {d.subject}
          </text>
        );
      })}
    </svg>
  );
}

function BarChartSVG({ data, width, height }) {
  const padding = { top: 20, right: 30, bottom: 40, left: 50 };
  const chartWidth = width - padding.left - padding.right;
  const chartHeight = height - padding.top - padding.bottom;
  const maxValue = Math.max(...data.flatMap(d => [d.活跃度, d.提交量]));
  const barGroupWidth = chartWidth / data.length;
  const barWidth = barGroupWidth * 0.35;
  const gap = barGroupWidth * 0.1;
  const scaleY = (value) => (value / maxValue) * chartHeight;

  return (
    <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} style={{maxWidth: width, maxHeight: height}}>
      {[0, 0.25, 0.5, 0.75, 1].map((ratio, i) => (
        <line key={i} x1={padding.left} y1={padding.top + chartHeight * (1 - ratio)} x2={padding.left + chartWidth} y2={padding.top + chartHeight * (1 - ratio)} stroke="#e2e8f0" strokeWidth="1" />
      ))}
      <line x1={padding.left} y1={padding.top} x2={padding.left} y2={padding.top + chartHeight} stroke="#e2e8f0" strokeWidth="1" />
      <line x1={padding.left} y1={padding.top + chartHeight} x2={padding.left + chartWidth} y2={padding.top + chartHeight} stroke="#e2e8f0" strokeWidth="1" />
      {data.map((d, i) => {
        const x1 = padding.left + i * barGroupWidth + gap;
        const x2 = x1 + barWidth;
        const y1 = padding.top + chartHeight - scaleY(d.活跃度);
        const barHeight = scaleY(d.活跃度);
        const x3 = x2 + gap;
        const x4 = x3 + barWidth;
        const y2 = padding.top + chartHeight - scaleY(d.提交量);
        const barHeight2 = scaleY(d.提交量);
        return (
          <g key={i}>
            <rect x={x1} y={y1} width={barWidth} height={barHeight} fill="#3b82f6" rx="4" />
            <rect x={x3} y={y2} width={barWidth} height={barHeight2} fill="#a855f7" rx="4" />
          </g>
        );
      })}
      {data.map((d, i) => (
        <text key={i} x={padding.left + i * barGroupWidth + barGroupWidth / 2} y={padding.top + chartHeight + 20} textAnchor="middle" fill="#64748b" fontSize="12" fontFamily="sans-serif">{d.name}</text>
      ))}
      {[0, 0.25, 0.5, 0.75, 1].map((ratio, i) => (
        <text key={i} x={padding.left - 8} y={padding.top + chartHeight * (1 - ratio) + 4} textAnchor="end" fill="#64748b" fontSize="11" fontFamily="sans-serif">{Math.round(maxValue * ratio)}</text>
      ))}
    </svg>
  );
}

function AIChatPanel({ onClose, onNavigate }) {
  const [messages, setMessages] = useState([
    { role: 'ai', content: '您好！我是AI教学助手，可以帮您生成课件、分析学情、推荐案例、设计测验等。请问有什么可以帮您的？' }
  ]);
  const [input, setInput] = useState('');
  const [isTyping, setIsTyping] = useState(false);
  const chatEndRef = useRef(null);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const handleSend = (text) => {
    const msg = text || input;
    if (!msg.trim()) return;
    setMessages(prev => [...prev, { role: 'user', content: msg }]);
    setInput('');
    setIsTyping(true);
    setTimeout(() => {
      let reply = '';
      if (msg.includes('学情') || msg.includes('报告')) {
        reply = '📊 已为您生成24级酒管1班本周学情报告概要：\n\n• 平均分：76.5分（较上周↑2.3）\n• 薄弱模块：客诉突发处理（62分）\n• 预警学生：5人\n• 建议：强化客诉处理专项训练\n\n是否跳转至详细学情分析页面？';

        reply = '💡 为您推荐以下教学案例：\n\n1. 超售情况下的VIP客人安抚策略\n2. 外籍客人突发疾病应急处理\n3. 团队入住信息错误快速处理\n\n这些案例已加入知识库，可直接用于备课。是否跳转至知识库查看？';
      } else if (msg.includes('测验') || msg.includes('题目') || msg.includes('出题')) {
        reply = '📝 已为您设计10道餐饮摆台规范单选题，涵盖：\n\n• 餐具摆放顺序（3题）\n• 餐巾折叠规范（2题）\n• 酒具摆放标准（3题）\n• 特殊场合摆台（2题）\n\n已保存至AI备课中心，是否跳转查看？';
      } else if (msg.includes('补救') || msg.includes('方案')) {
        reply = '🎯 已为低分学生制定个性化补救方案：\n\n• 张三（72分）：推荐客诉处理案例+3道专项练习\n• 李四（68分）：推荐基础概念解析+情景模拟训练\n• 孙八（58分）：推荐全模块回顾+1对1AI辅导\n\n是否一键分发补救任务？';
      } else {
        reply = '收到您的需求，我可以帮您：\n\n1. 📊 生成学情分析报告\n2. 💡 推荐教学案例\n3. 📝 设计随堂测验\n4. 🎯 制定个性化补救方案\n5. 📖 生成课程课件\n\n请告诉我您需要什么帮助？';
      }
      setMessages(prev => [...prev, { role: 'ai', content: reply }]);
      setIsTyping(false);
    }, 1500);
  };

  return (
    <div className="fixed inset-0 bg-black/30 z-50 flex justify-end" onClick={onClose}>
      <div className="w-[420px] h-full bg-white shadow-2xl flex flex-col slide-up" onClick={e => e.stopPropagation()}>

          <div className="flex flex-wrap gap-2">

              <Send />
            </button>

}

                    <span className="text-[10px] bg-green-50 text-green-600 border border-green-200 px-2 py-0.5 rounded-full font-medium">正常</span>
                  )}
                </td>
                <td className="py-3 px-4">
                  <div className="flex items-center space-x-2">
                    <button className="text-xs text-blue-600 hover:text-blue-700 cursor-pointer" onClick={(e) => { e.stopPropagation(); onSelectStudent(student); }}>详情</button>
                    <span className="text-slate-300">|</span>
                    <button className="text-xs text-purple-600 hover:text-purple-700 cursor-pointer" onClick={(e) => { e.stopPropagation(); }}>补救方案</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}
