// --- Radar Chart (Pure SVG) ---
const RadarChartSVG = ({ data }) => {
  const cx = 150, cy = 120, maxR = 85;
  const n = data.length;
  const angleStep = (2 * Math.PI) / n;
  const startAngle = -Math.PI / 2;

  const getPoint = (value, idx) => {
    const angle = startAngle + idx * angleStep;
    const r = (value / 100) * maxR;
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  };

  const gridLevels = [20, 40, 60, 80, 100];
  const radarPoints = data.map((d, i) => getPoint(d.score, i));
  const radarPath = radarPoints.map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`)).join(' ') + ' Z';

  return (
    <svg width="100%" height="100%" viewBox="0 0 300 240">
      {/* Grid rings */}
      {gridLevels.map(level => {
        const pts = data.map((_, i) => getPoint(level, i));
        const d = pts.map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`)).join(' ') + ' Z';
        return <path key={level} d={d} fill="none" stroke="#e2e8f0" strokeWidth="1"/>;
      })}
      {/* Axis lines */}
      {data.map((_, i) => {
        const p = getPoint(100, i);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#e2e8f0" strokeWidth="1"/>;
      })}
      {/* Data polygon */}
      <path d={radarPath} fill="rgba(59,130,246,0.25)" stroke="#3b82f6" strokeWidth="2"/>
      {/* Data points */}
      {radarPoints.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r="4" fill="#3b82f6"/>
      ))}
      {/* Labels */}
      {data.map((d, i) => {
        const p = getPoint(105, i);
        const shortLabel = d.subject.length > 6 ? d.subject.slice(0,5)+'…' : d.subject;
        return (
          <text key={i} x={p.x} y={p.y} textAnchor="middle" fontSize="11" fill="#475569" fontWeight="500">
            {shortLabel}
          </text>
        );
      })}
    </svg>
  );
};

// --- Bar Chart (Pure SVG) ---
const BarChartSVG = ({ data }) => {
  const w = 700, h = 220, padL = 40, padB = 30, padT = 10, padR = 20;
  const chartW = w - padL - padR, chartH = h - padB - padT;
  const maxVal = Math.max(...data.flatMap(d => [d.活跃度, d.提交量])) * 1.1;
  const barGroupW = chartW / data.length;
  const barW = barGroupW * 0.35;
  const gap = barGroupW * 0.1;

  const yTicks = [0, 2000, 4000, 6000, 8000, 10000];

  return (
    <svg width="100%" height="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="xMidYMid meet">
      {/* Y axis grid */}
      {yTicks.map(t => {
        const y = padT + chartH - (t / maxVal) * chartH;
        return (
          <g key={t}>
            <line x1={padL} y1={y} x2={w - padR} y2={y} stroke="#e2e8f0" strokeWidth="1"/>
            <text x={padL - 6} y={y + 4} textAnchor="end" fontSize="11" fill="#64748b">{t >= 1000 ? (t/1000)+'k' : t}</text>
          </g>
        );
      })}
      {/* X axis */}
      <line x1={padL} y1={padT + chartH} x2={w - padR} y2={padT + chartH} stroke="#e2e8f0" strokeWidth="1"/>
      {/* Bars */}
      {data.map((d, i) => {
        const x = padL + i * barGroupW + gap;
        const y1 = padT + chartH - (d.活跃度 / maxVal) * chartH;
        const y2 = padT + chartH - (d.提交量 / maxVal) * chartH;
        return (
          <g key={i}>
            {/* 活跃度 bar */}
            <rect x={x} y={y1} width={barW} height={padT + chartH - y1} rx="3" fill="#3b82f6" opacity="0.9"/>
            {/* 提交量 bar */}
            <rect x={x + barW + 4} y={y2} width={barW} height={padT + chartH - y2} rx="3" fill="#a855f7" opacity="0.9"/>
            {/* X label */}
            <text x={x + barW + 2} y={padT + chartH + 16} textAnchor="middle" fontSize="12" fill="#64748b">{d.name}</text>
          </g>
        );
      })}
      {/* Legend */}
      <rect x={w - 180} y={8} width="10" height="10" rx="2" fill="#3b82f6"/>
      <text x={w - 165} y={17} fontSize="12" fill="#64748b">登录活跃度</text>
      <rect x={w - 80} y={8} width="10" height="10" rx="2" fill="#a855f7"/>
      <text x={w - 65} y={17} fontSize="12" fill="#64748b">任务提交量</text>
    </svg>
  );
};
